name: Security Automation

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts || npm install --ignore-scripts --no-fund --no-audit

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=critical

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          if rg -n --hidden \
            --glob '!**/.git/**' \
            --glob '!**/.next/**' \
            --glob '!**/node_modules/**' \
            --glob '!**/.github/workflows/**' \
            '-----BEGIN (RSA|EC|OPENSSH|DSA|PRIVATE) PRIVATE KEY-----|AIza[0-9A-Za-z\\-_]{35}|sk_live_[0-9A-Za-z]{16,}|rk_live_[0-9A-Za-z]{16,}|ghp_[0-9A-Za-z]{36,}|github_pat_[0-9A-Za-z_]{20,}' .; then
            echo "Potential secret material found."
            exit 1
          fi

